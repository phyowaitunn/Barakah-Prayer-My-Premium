<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Barakah Prayer MY</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">
</head>


<body>

<div id="splash">
<h1>🕌 Barakah Prayer</h1>
</div>

<div class="container">

<!-- HOME -->
<section id="home" class="screen active">

<h2>Barakah Prayer MY</h2>

<p id="gregorianDate"></p>
<p id="hijriDate"></p>

<h3 id="countdown"></h3>

<div class="prayer-box">
<div class="card" id="FajrCard">Fajr <b id="fajr"></b></div>
<div class="card" id="DhuhrCard">Dhuhr <b id="dhuhr"></b></div>
<div class="card" id="AsrCard">Asr <b id="asr"></b></div>
<div class="card" id="MaghribCard">Maghrib <b id="maghrib"></b></div>
<div class="card" id="IshaCard">Isha <b id="isha"></b></div>
</div>

</section>

<!-- QIBLA -->
<section id="qibla" class="screen">
<h2>Qibla</h2>
<div id="needle"></div>
<p id="qiblaAngle"></p>
</section>

<!-- CALENDAR -->
<section id="calendar" class="screen">
<h2 id="monthTitle"></h2>
<div id="calendarGrid"></div>
</section>

<!-- SETTINGS -->
<section id="settings" class="screen">
<h3>Settings</h3>
<button onclick="toggleTheme()">Dark Mode</button>
</section>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
<button onclick="showScreen('home')">🏠</button>
<button onclick="showScreen('qibla')">🧭</button>
<button onclick="showScreen('calendar')">📅</button>
<button onclick="showScreen('settings')">⚙</button>
</nav>

<script src="script.js"></script>
</body>

  
</html>
